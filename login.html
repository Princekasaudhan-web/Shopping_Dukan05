<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Shopping Dukan</title>

    <link rel="stylesheet" href="styles/main.min.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="logo">
            <a href="index.html">Shopping Dukan</a>
        </div>

        <nav class="navbar">

            <a href="index.html">Home</a>
            <a href="index.html#products">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html" class="active">Login</a>

        </nav>

    </header>

    <!-- Login Form -->

    <section class="auth-section">

        <div class="auth-container">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-group">

                    <label>Email</label>

                    <input type="email"
                           id="loginEmail"
                           placeholder="Enter your email"
                           required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-box">

                        <input type="password"
                               id="loginPassword"
                               placeholder="Enter your password"
                               required>

                        <i class="fa-solid fa-eye togglePassword"
                           onclick="togglePassword('loginPassword',this)"></i>

                    </div>

                </div>

                <a href="#" class="forgot-password">
                    Forgot Password?
                </a>

                <button type="submit" class="auth-btn">
                    Login
                </button>

                <p class="switch-form">

                    Don't have an account?

                    <a href="signup.html">
                        Sign Up
                    </a>

                </p>

                <p id="loginMessage"></p>

            </form>

        </div>

    </section>

    <script type="module" src="scripts/login.min.js" defer></script>

</body>

</html>
